teleportation:
  delay: 3
  cooldown: 10
  cancel-on-movement: true
  effects:
    sound-start: "ENTITY_ENDERMAN_TELEPORT"
    sound-success: "ENTITY_ENDERMAN_TELEPORT"
    sound-cancel: "BLOCK_NOTE_BLOCK_BASS"
    particle: "PORTAL"
    particle-speed: 0.1
    particle-count: 30

homes:
  enabled: true
  default-limit: 5
  sounds:
    created: "BLOCK_NOTE_BLOCK_PLING"
    deleted: "BLOCK_NOTE_BLOCK_BASS"
    teleport: "ENTITY_ENDERMAN_TELEPORT"
  particles:
    created: "VILLAGER_HAPPY"
    deleted: "SMOKE"
    count: 20

warps:
  enabled: true
  sounds:
    created: "BLOCK_NOTE_BLOCK_PLING"
    deleted: "BLOCK_NOTE_BLOCK_BASS"
    teleport: "ENTITY_ENDERMAN_TELEPORT"
  particles:
    created: "VILLAGER_HAPPY"
    deleted: "SMOKE"
    count: 20

spawn:
  enabled: true
  sounds:
    set: "BLOCK_NOTE_BLOCK_PLING"
    deleted: "BLOCK_NOTE_BLOCK_BASS"
    teleport: "ENTITY_ENDERMAN_TELEPORT"
  particles:
    set: "VILLAGER_HAPPY"
    deleted: "SMOKE"
    count: 20

lobby:
  enabled: true
  sounds:
    set: "BLOCK_NOTE_BLOCK_PLING"
    deleted: "BLOCK_NOTE_BLOCK_BASS"
    teleport: "ENTITY_ENDERMAN_TELEPORT"
  particles:
    set: "VILLAGER_HAPPY"
    deleted: "SMOKE"
    count: 20

economy:
  enabled: true
  costs:
    warp: 10.0
    home: 5.0
    spawn: 0.0
    lobby: 0.0

system:
  sounds:
    error: "BLOCK_NOTE_BLOCK_BASS"
    help-open: "BLOCK_NOTE_BLOCK_PLING"
