name: LazyTeleport
version: ${version}
main: com.vomlabs.lazytp.folia.FoliaBootstrap
api-version: '1.21'
folia-supported: true

permissions:
  lazyteleport.warp:
    description: Use /warp
    default: true
  lazyteleport.setwarp:
    description: Use /setwarp
    default: op
  lazyteleport.delwarp:
    description: Use /delwarp
    default: op
  lazyteleport.listwarp:
    description: Use /listwarp
    default: true
  lazyteleport.home:
    description: Use /home
    default: true
  lazyteleport.sethome:
    description: Use /sethome
    default: true
  lazyteleport.delhome:
    description: Use /delhome
    default: true
  lazyteleport.listhome:
    description: Use /listhome
    default: true
  lazyteleport.spawn:
    description: Use /spawn
    default: true
  lazyteleport.setspawn:
    description: Use /setspawn
    default: op
  lazyteleport.delspawn:
    description: Use /delspawn
    default: op
  lazyteleport.lobby:
    description: Use /lobby
    default: true
  lazyteleport.setlobby:
    description: Use /setlobby
    default: op
  lazyteleport.dellobby:
    description: Use /dellobby
    default: op
  lazyteleport.admin:
    description: Administer the plugin
    default: op
    children:
      lazyteleport.setwarp: true
      lazyteleport.delwarp: true
      lazyteleport.setspawn: true
      lazyteleport.delspawn: true
      lazyteleport.setlobby: true
      lazyteleport.dellobby: true
  lazyteleport.bypass.cooldown:
    description: Bypass teleport cooldown
    default: op
  lazyteleport.bypass.delay:
    description: Bypass teleport delay
    default: op

commands:
  lazytp:
    description: LazyTeleport admin and help commands
    usage: /<command> <help|reload|version>
  warp:
    description: Teleport to a warp
    usage: /<command> <name>
  setwarp:
    description: Create a warp
    usage: /<command> <name>
  delwarp:
    description: Delete a warp
    usage: /<command> <name>
  listwarp:
    description: List all warps
    usage: /<command>
  home:
    description: Teleport to your home
    usage: /<command> [name]
  sethome:
    description: Set your home
    usage: /<command> [name]
  delhome:
    description: Delete a home
    usage: /<command> <name>
  listhome:
    description: List your homes
    usage: /<command>
  spawn:
    description: Teleport to spawn
    usage: /<command>
  setspawn:
    description: Set the spawn location
    usage: /<command>
  delspawn:
    description: Delete the spawn location
    usage: /<command>
  lobby:
    description: Teleport to the lobby
    usage: /<command>
  setlobby:
    description: Set the lobby location
    usage: /<command>
  dellobby:
    description: Delete the lobby location
    usage: /<command>
